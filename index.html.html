<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ระบบฝากของลูกค้า Firebase</title>
<style>
body{font-family:Arial;background:#F8F4EE;margin:0;padding:15px}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px}
input,textarea,select{width:100%;padding:10px;margin:5px 0;box-sizing:border-box}
button{background:#B08968;color:#fff;border:none;padding:10px 14px;border-radius:8px}
.tabs button{margin-right:5px}
img{max-width:80px;border-radius:8px}
</style>
</head>
<body>
<div class="card">
<h2>📦 ระบบจัดการฝากของลูกค้า</h2>
<input id="name" placeholder="ชื่อลูกค้า">
<input id="phone" placeholder="เบอร์โทร">
<textarea id="address" placeholder="ที่อยู่"></textarea>
<input id="date" type="date">
<label><input id="checked" type="checkbox"> เช็คของครบแล้ว</label>
<select id="status">
<option>ฝากของ</option>
<option>ส่งของเลย</option>
</select>
<textarea id="note" placeholder="หมายเหตุ"></textarea>
<input id="images" type="file" multiple accept="image/*">
<button onclick="saveCustomer()">บันทึก</button>
</div>

<div class="card">
<input id="search" placeholder="ค้นหา..." oninput="loadCustomers()">
<div class="tabs">
<button onclick="currentTab='all';loadCustomers()">ทั้งหมด</button>
<button onclick="currentTab='ฝากของ';loadCustomers()">ฝากของ</button>
<button onclick="currentTab='ส่งของเลย';loadCustomers()">ส่งของเลย</button>
</div>
<div id="list"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig={
apiKey:"AIzaSyBgR40L4jIg5KcxQFxp4-wbaDhxo-PmWfs",
authDomain:"chibibi29.firebaseapp.com",
projectId:"chibibi29",
storageBucket:"chibibi29.firebasestorage.app",
messagingSenderId:"69596771030",
appId:"1:69596771030:web:17bfda3215bdbcb84f0f77"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
window.currentTab='all';

async function compress(file){
 return new Promise(r=>{
  const img=new Image();
  img.onload=()=>{
   const c=document.createElement('canvas');
   let w=img.width,h=img.height,max=1280;
   if(w>max){h*=max/w;w=max;}
   c.width=w;c.height=h;
   c.getContext('2d').drawImage(img,0,0,w,h);
   r(c.toDataURL('image/jpeg',0.7));
  };
  img.src=URL.createObjectURL(file);
 });
}

window.saveCustomer=async()=>{
 const imgs=[];
 for(const f of [...images.files]) imgs.push(await compress(f));

 await addDoc(collection(db,'customers'),{
  name:name.value,
  phone:phone.value,
  address:address.value,
  date:date.value,
  checked:checked.checked,
  status:status.value,
  note:note.value,
  images:imgs,
  createdAt:Date.now()
 });

 alert('บันทึกสำเร็จ');
 loadCustomers();
};

window.removeCustomer=async(id)=>{
 await deleteDoc(doc(db,'customers',id));
 loadCustomers();
};

window.loadCustomers=async()=>{
 const q=search.value.toLowerCase();
 const snap=await getDocs(collection(db,'customers'));
 let html='';
 snap.forEach(d=>{
   const x=d.data();
   if(q && !x.name.toLowerCase().includes(q)) return;
   if(currentTab!=='all' && x.status!==currentTab) return;

   const days=Math.floor((Date.now()-new Date(x.date))/86400000);
   const warn=(x.status==='ฝากของ' && days>=14)?'⚠️':'';

   html+=`
   <div class="card">
   <b>${x.name}</b> ${warn}<br>
   📞 ${x.phone||'-'}<br>
   📦 ${x.status}<br>
   ⏳ ${days||0} วัน<br>
   🏠 ${x.address}<br>
   <button onclick="window.print()">พิมพ์</button>
   <button onclick="removeCustomer('${d.id}')">ลบ</button>
   </div>`;
 });
 document.getElementById('list').innerHTML=html;
};
loadCustomers();
</script>
</body>
</html>
